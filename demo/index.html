<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>og-route-kit demo</title>
    <meta name="description" content="Code-rendered Open Graph image routes for Next.js. Live gallery of cards rendered by the kit." />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #151515;
        background: #f7f5ef;
      }
      main { max-width: 920px; margin: 0 auto; padding: 64px 24px 96px; }
      h1 { font-size: 40px; line-height: 1.05; margin: 0 0 12px; }
      .lede { font-size: 19px; color: #494844; margin: 0 0 8px; max-width: 60ch; }
      .links { margin: 24px 0 56px; font-size: 15px; }
      .links a { color: #2f6f62; font-weight: 600; text-decoration: none; }
      .links a:hover { text-decoration: underline; }
      figure { margin: 0 0 56px; }
      figure img {
        width: 100%; height: auto; display: block;
        border: 1px solid #d8d2c3; background: #fff;
        border-radius: 8px;
      }
      figcaption { margin-top: 14px; }
      figcaption b { font-size: 17px; }
      figcaption span { color: #6b6a64; }
      pre {
        margin: 12px 0 0; padding: 16px 18px; overflow-x: auto;
        background: #151515; color: #f5f5f0; border-radius: 8px;
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      footer { color: #6b6a64; font-size: 14px; border-top: 1px solid #d8d2c3; padding-top: 24px; }
    </style>
  </head>
  <body>
    <main>
      <h1>og-route-kit</h1>
      <p class="lede">Code-rendered Open Graph image routes for Next.js. Each image below is a real PNG, rendered by the kit and exported with its own CLI during the build.</p>
      <p class="links">
        <a href="https://github.com/pixelbrew-studio/og-route-kit">GitHub</a> &middot;
        <a href="https://github.com/pixelbrew-studio/og-route-kit#readme">Docs</a>
      </p>

      <figure>
        <img src="images/product.png" alt="Product Open Graph card" width="1200" height="630" />
        <figcaption>
          <b>Product card</b> <span>&mdash; ProductCard, size "og" (1200&times;630)</span>
          <pre>export const GET = createOgRoute({
  size: "og",
  defaults: { eyebrow, title, description },
  render: ProductCard,
});</pre>
        </figcaption>
      </figure>

      <figure>
        <img src="images/article.png" alt="Article Open Graph card" width="1200" height="630" />
        <figcaption>
          <b>Article card</b> <span>&mdash; ArticleCard, params overridden via query string</span>
          <pre>/api/og/article?title=Why+coded+OG+routes+beat+exported+PNGs</pre>
        </figcaption>
      </figure>

      <figure>
        <img src="images/changelog.png" alt="Changelog Open Graph card" width="1200" height="630" />
        <figcaption>
          <b>Changelog card</b> <span>&mdash; ChangelogCard, dark theme</span>
          <pre>/api/og/changelog?eyebrow=v0.1.0&amp;title=Initial+route+kit+release</pre>
        </figcaption>
      </figure>

      <footer>
        Rendered with <code>next/og</code>. Routes defined with <code>createOgRoute</code>, exported with <code>og-route-kit export</code>. MIT licensed.
      </footer>
    </main>
  </body>
</html>
